<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My APK Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      color: #333;
    }
    header {
      background: #2d2f36;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.3rem;
    }
    .app-list {
      margin: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .app-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-radius: 10px;
      padding: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }
    .app-card:hover {
      transform: translateY(-2px);
    }
    .app-name {
      font-size: 1rem;
      font-weight: 500;
      flex: 1;
    }
    .download-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      transition: background 0.3s ease;
    }
    .download-btn i {
      margin-right: 6px;
    }
    .download-btn:active {
      background: #388e3c;
    }
    /* Mobile-first adjustments */
    @media (max-width: 600px) {
      .app-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .download-btn {
        margin-top: 0.5rem;
        width: 100%;
        justify-content: center;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>📱 My APK Store</header>

  <div class="app-list">
    <!-- Example app entries -->
    <div class="app-card">
      <span class="app-name">CoolApp v1.0</span>
      <a href="apks/coolapp.apk" download>
        <button class="download-btn"><i class="fa fa-download"></i> Download</button>
      </a>
    </div>

    <div class="app-card">
      <span class="app-name">GameMaster v2.3</span>
      <a href="apks/gamemaster.apk" download>
        <button class="download-btn"><i class="fa fa-download"></i> Download</button>
      </a>
    </div>

    <div class="app-card">
      <span class="app-name">UtilityPro v5.1</span>
      <a href="apks/utilitypro.apk" download>
        <button class="download-btn"><i class="fa fa-download"></i> Download</button>
      </a>
    </div>
  </div>
</body>
</html>
